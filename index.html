<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="icon" href="./favicons/favicon-16x16.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=volume_off,volume_up" />

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <main>
        <div class="menu">
            <div class="menu-container">
                <div class="menu-screen">
                    <div>
                        <span class="pokemon_name"></span>
                        <div class="row">
                            <img src="./images/height.png" class="icon" alt="">
                            <span class="pokemon_height"></span>
                        </div>
                        <div class="row">
                            <img src="./images/weight.png" alt="" class="icon">
                            <span class="pokemon_weight"></span>
                        </div>
                    </div>
                    <div class="stats row">
                        <div>
                            Attack<br>
                            <span class="pokemon_attack"></span>
                        </div>
                        <div>
                            HP<br>
                            <span class="pokemon_hp"></span>
                        </div>
                        <div>
                            Defense<br>
                            <span class="pokemon_defense"></span>
                        </div>
                    </div>
                    <span class="pokemon_description"></span>
                </div>
                <div class="menu-screen abilities-screen"></div>
                <div class="menu-screen battles-screen"></div>
            </div>
        </div>

        <div class="row pokemon_types">

        </div>

        <audio class="pokemon_sound">
            <source src="" type="audio/ogg">
        </audio>

        <img src="" class="pokemon_image">

        <h1 class="pokemon_data">
            <span class="pokemon_number"></span> -
            <span class="pokemon_name"></span>
        </h1>

        <div class="scroll-indicator">
            <button class="indicator left-indicator">&lt;</button>
            <button class="indicator right-indicator">&gt;</button>
        </div>

        <form class="form">
            <input type="search" class="input_search" placeholder="Nome ou Número" required>
        </form>

        <div class="buttons">
            <button class="button btn-up">&#8963;</button>
            <div class="row">
                <button class="button btn-prev">&lt</button>
                <button class="button btn-confirm">OK</button>
                <button class="button btn-next">&gt</button>
            </div>
            <button class="button btn-down">&#8964;</button>
        </div>

        <button class="button btn-sound" >
            <span class="material-symbols-outlined">
                volume_up
            </span>
        </button>


        <img src="images/pokedexm.png" alt="pokedex" class="pokedex">
    </main>

    <script src="js/script.js"></script>
</body>
</html>
